name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2.3.0
      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5
      - name: Install Haxelib
        run: |
          haxelib setup C:/haxelib
          haxelib install lime 8.0.1
          haxelib install openfl 9.2.1
          haxelib install flixel 4.11.0
          haxelib run lime setup flixel
          haxelib run lime setup
          haxelib install flixel-tools 1.5.1
          haxelib run flixel-tools setup
          haxelib install flixel-ui 2.5.0
          haxelib install flixel-addons 3.0.2
          haxelib install hscript 2.5.0
          haxelib install hxCodec 2.5.1
          haxelib install Brewscript
          haxelib install flixel-demos 2.9.0
          haxelib install flixel-templates 2.6.6
          haxelib install lime-samples 7.0.0
          haxelib git linc_luajit https://github.com/superpowers04/linc_luajit
          haxelib install hxdiscord_rpc 1.3.0
          haxelib install flxanimate 3.0.4
          haxelib install hxcpp 4.2.1
          haxelib install hxWindowColorMode 0.2.0
          haxelib set lime 8.0.1
          haxelib set openfl 9.2.1
          haxelib set flixel 5.2.2
          haxelib list
        shell: cmd
      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION
      - name: Compile Windows
        run: haxelib run lime build windows --app-version=${{ github.run_id }}
      - name: Publish Windows Artifact
        uses: actions/upload-artifact@v2
        with:
          name: windows-build
          path: export/windows/bin

  buildAndroid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.0
      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5
      - name: Install Haxelib
        run: |
          haxelib setup ~/.haxelib
          haxelib install lime 8.0.1
          haxelib install openfl 9.2.1
          haxelib install flixel 4.11.0
          haxelib run lime setup flixel
          haxelib run lime setup
          haxelib install flixel-tools 1.5.1
          haxelib run flixel-tools setup
          haxelib install flixel-ui 2.5.0
          haxelib install flixel-addons 3.0.2
          haxelib install hscript 2.5.0
          haxelib install hxCodec 2.5.1
          haxelib install Brewscript
          haxelib install flixel-demos 2.9.0
          haxelib install flixel-templates 2.6.6
          haxelib install lime-samples 7.0.0
          haxelib git linc_luajit https://github.com/superpowers04/linc_luajit
          haxelib install hxdiscord_rpc 1.3.0
          haxelib install flxanimate 3.0.4
          haxelib install hxcpp 4.2.1
          haxelib install hxWindowColorMode 0.2.0
          haxelib set lime 8.0.1
          haxelib set openfl 9.2.1
          haxelib set flixel 5.2.2
          haxelib list
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 29
          ndk: 21.4.7075529
          cmake: 3.10.2.4988404
      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION
      - name: Compile Android
        run: haxelib run lime build android --app-version=${{ github.run_id }}
      - name: Publish Android Artifact
        uses: actions/upload-artifact@v2
        with:
          name: android-build
          path: export/android/bin/app/build/outputs/apk/debug/
